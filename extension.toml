id = "gentoo-syntax"
name = "Gentoo Syntax"
version = "0.1.0"
schema_version = 1
authors = ["democe <democe@democe.com>"]
description = "Gentoo Portage and OpenRC syntax highlighting for Zed."
repository = "https://github.com/democe/gentoo-syntax-zed"

[grammars.bash]
repository = "https://github.com/tree-sitter/tree-sitter-bash"
rev = "a06c2e4415e9bc0346c6b86d401879ffb44058f7"

[grammars.xml]
repository = "https://github.com/tree-sitter-grammars/tree-sitter-xml"
rev = "5000ae8f22d11fbe93939b05c1e37cf21117162d"
path = "xml"

[grammars.rst]
repository = "https://github.com/stsewd/tree-sitter-rst"
rev = "a60f1070b824cb8bb8409b4b6d7da0d07997c30e"

[grammars.gentoo_make_conf]
repository = "https://github.com/democe/gentoo-syntax-zed"
rev = "main"
path = "grammars/gentoo-make-conf"

[grammars.gentoo_mirrors]
repository = "https://github.com/democe/gentoo-syntax-zed"
rev = "main"
path = "grammars/gentoo-mirrors"

[grammars.gentoo_package_keywords]
repository = "https://github.com/democe/gentoo-syntax-zed"
rev = "main"
path = "grammars/gentoo-package-keywords"

[grammars.gentoo_package_license]
repository = "https://github.com/democe/gentoo-syntax-zed"
rev = "main"
path = "grammars/gentoo-package-license"

[grammars.gentoo_package_mask]
repository = "https://github.com/democe/gentoo-syntax-zed"
rev = "main"
path = "grammars/gentoo-package-mask"

[grammars.gentoo_package_properties]
repository = "https://github.com/democe/gentoo-syntax-zed"
rev = "main"
path = "grammars/gentoo-package-properties"

[grammars.gentoo_package_use]
repository = "https://github.com/democe/gentoo-syntax-zed"
rev = "main"
path = "grammars/gentoo-package-use"

[grammars.gentoo_use_desc]
repository = "https://github.com/democe/gentoo-syntax-zed"
rev = "main"
path = "grammars/gentoo-use-desc"
